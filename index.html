<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>勿繁 · 短诗集</title>
    <link href="https://fonts.loli.net/css2?family=Noto+Serif+SC:wght@300;400;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --warm-white: #F5EDE4;
            --cream: #EDE4D8;
            --text-dark: #2C1810;
            --accent: #5C4033;
            --light-accent: #8B7355;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Noto Serif SC', 'Songti SC', serif;
            background-color: var(--warm-white);
            color: var(--text-dark);
            line-height: 1.8;
            overflow-x: hidden;
        }
        
        /* Texture Overlay */
        .texture-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("images/texture.png");
            background-repeat: repeat;
            opacity: 0.7;
            pointer-events: none;
            z-index: 1;
        }
        
        /* Navigation - Long Bar */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(245, 237, 228, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(92, 64, 51, 0.1);
            z-index: 1000;
            padding: 0 2rem;
        }
        
        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 60px;
        }
        
        .logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.8rem;
            font-weight: 600;
            color: var(--text-dark);
            text-decoration: none;
        }
        
        .nav-links {
            display: flex;
            list-style: none;
            gap: 2rem;
        }
        
        .nav-links a {
            text-decoration: none;
            color: var(--text-dark);
            font-size: 0.9rem;
            transition: color 0.3s;
        }
        
        .nav-links a:hover {
            color: var(--accent);
        }
        
        /* Hero Section - Featured Poems Carousel */
        .hero {
            padding-top: 80px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        
        .carousel-container {
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
            position: relative;
            padding: 0 60px;
        }
        
        .carousel-wrapper {
            overflow: hidden;
        }
        
        .carousel-track {
            display: flex;
            transition: transform 0.5s ease;
        }
        
        .carousel-slide {
            min-width: 100%;
            padding: 2rem;
            text-align: center;
        }
        
        .carousel-date {
            font-size: 0.8rem;
            color: var(--light-accent);
            letter-spacing: 0.2em;
            margin-bottom: 1rem;
        }
        
        .carousel-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.5rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            color: var(--text-dark);
        }
        
        .carousel-content {
            font-size: 1.1rem;
            line-height: 2;
            max-width: 600px;
            margin: 0 auto 2rem;
            text-align: left;
        }
        
        /* Audio Player */
        .audio-player {
            max-width: 400px;
            margin: 0 auto 2rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.5rem 1rem;
            background: rgba(255,255,255,0.8);
            border-radius: 30px;
        }
        
        .play-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--accent);
            color: white;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .progress-bar {
            flex: 1;
            height: 3px;
            background: rgba(92, 64, 51, 0.2);
            border-radius: 2px;
            position: relative;
        }
        
        .progress-fill {
            width: 0%;
            height: 100%;
            background: var(--accent);
            border-radius: 2px;
        }
        
        .time {
            font-size: 0.75rem;
            color: var(--light-accent);
        }
        
        /* Action Buttons */
        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-top: 2rem;
        }
        
        .action-btn {
            padding: 0.6rem 1.2rem;
            border: 1px solid var(--accent);
            background: transparent;
            color: var(--accent);
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s;
        }
        
        .action-btn:hover {
            background: var(--accent);
            color: white;
        }
        
        .rattle-btn {
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }
        
        .rattle-count {
            font-weight: 600;
        }
        
        /* Carousel Arrows */
        .carousel-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255,255,255,0.9);
            border: 1px solid rgba(92, 64, 51, 0.2);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            z-index: 10;
            transition: all 0.3s;
        }
        
        .carousel-arrow:hover {
            background: var(--accent);
            color: white;
        }
        
        .carousel-arrow.prev { left: 0; }
        .carousel-arrow.next { right: 0; }
        
        /* Introduction Section */
        .intro-section {
            text-align: center;
            padding: 4rem 2rem;
            max-width: 600px;
            margin: 0 auto;
        }
        
        .intro-section h2 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2rem;
            margin-bottom: 1rem;
        }
        
        .intro-section p {
            color: var(--light-accent);
            font-size: 1rem;
        }
        
        .divider {
            width: 60px;
            height: 1px;
            background: var(--accent);
            margin: 2rem auto;
        }
        
        /* All Poems Section */
        .all-poems {
            padding: 4rem 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .section-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2rem;
            text-align: center;
            margin-bottom: 3rem;
        }
        
        .poems-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
        }
        
        .poem-card {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        
        .poem-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.12);
        }
        
        .poem-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }
        
        .poem-card-content {
            padding: 1.5rem;
        }
        
        .poem-card h3 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.3rem;
            margin-bottom: 0.5rem;
        }
        
        .poem-card .date {
            font-size: 0.8rem;
            color: var(--light-accent);
            margin-bottom: 0.5rem;
        }
        
        .poem-card .preview {
            font-size: 0.9rem;
            color: var(--light-accent);
            line-height: 1.6;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.6);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        
        .modal-overlay.active {
            display: flex;
        }
        
        .modal-content {
            background: var(--warm-white);
            max-width: 700px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 3rem;
            position: relative;
            border-radius: 4px;
        }
        
        .modal-close {
            position: absolute;
            top: 1rem;
            right: 1rem;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: transparent;
            border: 1px solid var(--accent);
            cursor: pointer;
            font-size: 1.2rem;
            color: var(--accent);
        }
        
        .modal-date {
            font-size: 0.8rem;
            color: var(--light-accent);
            letter-spacing: 0.2em;
            margin-bottom: 1rem;
        }
        
        .modal-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2rem;
            margin-bottom: 2rem;
        }
        
        .modal-body {
            font-size: 1.1rem;
            line-height: 2;
            margin-bottom: 2rem;
            white-space: pre-line;
        }
        
        .modal-actions {
            display: flex;
            gap: 1rem;
            justify-content: center;
            padding-top: 2rem;
            border-top: 1px solid rgba(92, 64, 51, 0.1);
        }
        
        /* Footer */
        footer {
            background: var(--text-dark);
            color: var(--cream);
            text-align: center;
            padding: 3rem 2rem;
        }
        
        /* Scroll to Top */
        .scroll-top {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--accent);
            color: white;
            border: none;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.3s;
        }
        
        .scroll-top.visible {
            display: flex;
        }
        
        /* Mobile */
        @media (max-width: 768px) {
            .nav-links {
                display: none;
            }
            
            .carousel-container {
                padding: 0 40px;
            }
            
            .carousel-title {
                font-size: 1.8rem;
            }
            
            .carousel-content {
                font-size: 1rem;
            }
            
            .poems-grid {
                grid-template-columns: 1fr;
            }
            
            .modal-content {
                padding: 2rem 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="texture-overlay"></div>
    
    <nav>
        <div class="nav-container">
            <a href="#" class="logo">勿繁</a>
            <ul class="nav-links">
                <li><a href="#featured">精选</a></li>
                <li><a href="#all-poems">全部诗作</a></li>
                <li><a href="#about">关于</a></li>
            </ul>
        </div>
    </nav>
    
    <section class="hero" id="featured">
        <div class="carousel-container">
            <button class="carousel-arrow prev" onclick="moveCarousel(-1)">←</button>
            <div class="carousel-wrapper">
                <div class="carousel-track" id="carouselTrack">
                    <!-- Slides will be inserted by JS -->
                </div>
            </div>
            <button class="carousel-arrow next" onclick="moveCarousel(1)">→</button>
        </div>
    </section>
    
    <section class="intro-section">
        <div class="divider"></div>
        <h2>勿繁 · 短诗集</h2>
        <p>写字的人，留下一些短记</p>
        <p>不归类、不解释、不追认</p>
        <div class="divider"></div>
    </section>
    
    <section class="all-poems" id="all-poems">
        <h2 class="section-title">全部诗作</h2>
        <div class="poems-grid" id="poemsGrid"></div>
    </section>
    
    <footer id="about">
        <p>勿繁 · 短诗集 · 2015-2019</p>
    </footer>
    
    <button class="scroll-top" id="scrollTop" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">↑</button>
    
    <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button class="modal-close" onclick="closeModal()">×</button>
            <div class="modal-date" id="modalDate"></div>
            <h2 class="modal-title" id="modalTitle"></h2>
            <div class="modal-body" id="modalBody"></div>
            <div class="modal-actions">
                <button class="action-btn" onclick="sharePoem()">分享</button>
                <button class="action-btn" onclick="copyLink()">复制链接</button>
                <button class="action-btn rattle-btn" onclick="rattlePoem(this)">
                    <span class="rattle-count">0</span> 棒棒糖
                </button>
            </div>
        </div>
    </div>
    
    <script>
        // Featured poems (first 4)
        const featuredPoems = [
            { title: "游者之命", date: "2016.10.8", content: "我们都是过客，在时间的河流里漂泊..." },
            { title: "风之语", date: "2017.3.15", content: "风从远方来，带着海的味道..." },
            { title: "夜行者", date: "2018.7.22", content: "在黑暗中行走，寻找那一丝光亮..." },
            { title: "归途", date: "2019.1.1", content: "所有的路都通向远方，除了回家的路..." }
        ];
        
        // All poems data will be inserted here
        const poems = [];
        
        let currentSlide = 0;
        
        function initCarousel() {
            const track = document.getElementById('carouselTrack');
            featuredPoems.forEach((poem, index) => {
                const slide = document.createElement('div');
                slide.className = 'carousel-slide';
                slide.innerHTML = `
                    <div class="carousel-date">${poem.date}</div>
                    <h2 class="carousel-title">${poem.title}</h2>
                    <div class="carousel-content">${poem.content}</div>
                    <div class="audio-player">
                        <button class="play-btn">▶</button>
                        <div class="progress-bar"><div class="progress-fill"></div></div>
                        <span class="time">0:00 / 2:17</span>
                    </div>
                    <div class="action-buttons">
                        <button class="action-btn" onclick="sharePoem(${index})">分享</button>
                        <button class="action-btn" onclick="copyLink(${index})">复制链接</button>
                        <button class="action-btn rattle-btn" onclick="rattlePoem(this)">
                            <span class="rattle-count">${Math.floor(Math.random() * 50) + 10}</span> 棒棒糖
                        </button>
                    </div>
                `;
                track.appendChild(slide);
            });
        }
        
        function moveCarousel(direction) {
            const track = document.getElementById('carouselTrack');
            currentSlide = (currentSlide + direction + featuredPoems.length) % featuredPoems.length;
            track.style.transform = `translateX(-${currentSlide * 100}%)`;
        }
        
        function renderPoems() {
            const grid = document.getElementById('poemsGrid');
            poems.forEach((poem, index) => {
                const card = document.createElement('div');
                card.className = 'poem-card';
                card.onclick = () => openModal(index);
                card.innerHTML = `
                    <img data-src="images/poem_${String(index + 1).padStart(3, '0')}.jpg" alt="${poem.title}" class="lazy-image">
                    <div class="poem-card-content">
                        <h3>${poem.title}</h3>
                        <div class="date">${poem.date}</div>
                        <div class="preview">${poem.content.substring(0, 100)}...</div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }
        
        function openModal(index) {
            const poem = poems[index];
            document.getElementById('modalDate').textContent = poem.date;
            document.getElementById('modalTitle').textContent = poem.title;
            document.getElementById('modalBody').textContent = poem.content;
            document.getElementById('modalOverlay').classList.add('active');
            document.body.style.overflow = 'hidden';
        }
        
        function closeModal(event) {
            if (!event || event.target === document.getElementById('modalOverlay')) {
                document.getElementById('modalOverlay').classList.remove('active');
                document.body.style.overflow = '';
            }
        }
        
        function sharePoem(index) {
            if (navigator.share) {
                navigator.share({
                    title: poems[index]?.title || '勿繁 · 短诗集',
                    text: poems[index]?.content?.substring(0, 100) || '',
                    url: window.location.href
                });
            } else {
                alert('分享功能需要HTTPS环境');
            }
        }
        
        function copyLink(index) {
            const url = window.location.href;
            navigator.clipboard.writeText(url).then(() => {
                alert('链接已复制');
            });
        }
        
        function rattlePoem(btn) {
            const count = btn.querySelector('.rattle-count');
            count.textContent = parseInt(count.textContent) + 1;
            btn.style.background = 'var(--accent)';
            btn.style.color = 'white';
        }
        
        // Lazy loading
        const imageObserver = new IntersectionObserver((entries, observer) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const img = entry.target;
                    img.src = img.dataset.src;
                    img.classList.remove('lazy-image');
                    observer.unobserve(img);
                }
            });
        });
        
        // Scroll to top
        window.addEventListener('scroll', () => {
            const btn = document.getElementById('scrollTop');
            if (window.scrollY > window.innerHeight / 2) {
                btn.classList.add('visible');
            } else {
                btn.classList.remove('visible');
            }
        });
        
        // Initialize
        initCarousel();
        renderPoems();
        
        document.querySelectorAll('.lazy-image').forEach(img => {
            imageObserver.observe(img);
        });
    </script>
</body>
</html>
