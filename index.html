<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>勿繁 · 短诗集</title>
    <link href="https://fonts.loli.net/css2?family=Noto+Serif+SC:wght@300;400;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --warm-white: #F5EDE4;
            --cream: #EDE4D8;
            --text-dark: #2C1810;
            --accent: #5C4033;
            --light-accent: #8B7355;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Noto Serif SC', 'Songti SC', serif;
            background-color: var(--warm-white);
            color: var(--text-dark);
            line-height: 1.8;
            overflow-x: hidden;
        }
        
        /* Texture Overlay */
        .texture-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("images/texture.png");
            background-repeat: repeat;
            opacity: 0.7;
            pointer-events: none;
            z-index: 1;
        }
        
        /* Navigation - Floating Pill with Glassmorphism */
        nav {
            position: fixed;
            top: 1.5rem;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(245, 237, 228, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(92, 64, 51, 0.15);
            border-radius: 50px;
            padding: 0.8rem 2.5rem;
            z-index: 1000;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
            max-width: 90%;
            width: auto;
        }
        
        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 60px;
        }
        
        .logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.8rem;
            font-weight: 600;
            color: var(--text-dark);
            text-decoration: none;
        }
        
        .nav-links {
            display: flex;
            list-style: none;
            gap: 2rem;
        }
        
        .nav-links a {
            text-decoration: none;
            color: var(--text-dark);
            font-size: 0.9rem;
            transition: color 0.3s;
        }
        
        .nav-links a:hover {
            color: var(--accent);
        }
        
        /* Hero Section - Featured Poems Carousel */
        .hero {
            padding-top: 80px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        
        .carousel-container {
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
            position: relative;
            padding: 0 60px;
        }
        
        .carousel-wrapper {
            overflow: hidden;
        }
        
        .carousel-track {
            display: flex;
            transition: transform 0.5s ease;
        }
        
        .carousel-slide {
            min-width: 100%;
            padding: 2rem;
            text-align: center;
        }
        
        .carousel-date {
            font-size: 0.8rem;
            color: var(--light-accent);
            letter-spacing: 0.2em;
            margin-bottom: 1rem;
        }
        
        .carousel-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.5rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            color: var(--text-dark);
        }
        
        .carousel-content {
            font-size: 1.1rem;
            line-height: 2;
            max-width: 600px;
            margin: 0 auto 2rem;
            text-align: left;
        }
        
        /* Audio Player */
        .audio-player {
            max-width: 400px;
            margin: 0 auto 2rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.5rem 1rem;
            background: rgba(255,255,255,0.8);
            border-radius: 30px;
        }
        
        .play-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--accent);
            color: white;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .progress-bar {
            flex: 1;
            height: 3px;
            background: rgba(92, 64, 51, 0.2);
            border-radius: 2px;
            position: relative;
        }
        
        .progress-fill {
            width: 0%;
            height: 100%;
            background: var(--accent);
            border-radius: 2px;
        }
        
        .time {
            font-size: 0.75rem;
            color: var(--light-accent);
        }
        
        /* Action Buttons */
        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-top: 2rem;
        }
        
        .action-btn {
            padding: 0.6rem 1.2rem;
            border: 1px solid var(--accent);
            background: transparent;
            color: var(--accent);
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s;
        }
        
        .action-btn:hover {
            background: var(--accent);
            color: white;
        }
        
        .rattle-btn {
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }
        
        .rattle-count {
            font-weight: 600;
        }
        
        /* Carousel Arrows */
        .carousel-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255,255,255,0.9);
            border: 1px solid rgba(92, 64, 51, 0.2);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            z-index: 10;
            transition: all 0.3s;
        }
        
        .carousel-arrow:hover {
            background: var(--accent);
            color: white;
        }
        
        .carousel-arrow.prev { left: 0; }
        .carousel-arrow.next { right: 0; }
        
        /* Introduction Section */
        .intro-section {
            text-align: center;
            padding: 4rem 2rem;
            max-width: 600px;
            margin: 0 auto;
        }
        
        .intro-section h2 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2rem;
            margin-bottom: 1rem;
        }
        
        .intro-section p {
            color: var(--light-accent);
            font-size: 1rem;
        }
        
        .divider {
            width: 60px;
            height: 1px;
            background: var(--accent);
            margin: 2rem auto;
        }
        
        /* All Poems Section */
        .all-poems {
            padding: 4rem 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .section-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2rem;
            text-align: center;
            margin-bottom: 3rem;
        }
        
        .poems-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
        }
        
        .poem-card {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        
        .poem-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.12);
        }
        
        .poem-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }
        
        .poem-card-content {
            padding: 1.5rem;
        }
        
        .poem-card h3 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.3rem;
            margin-bottom: 0.5rem;
        }
        
        .poem-card .date {
            font-size: 0.8rem;
            color: var(--light-accent);
            margin-bottom: 0.5rem;
        }
        
        .poem-card .preview {
            font-size: 0.9rem;
            color: var(--light-accent);
            line-height: 1.6;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.6);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        
        .modal-overlay.active {
            display: flex;
        }
        
        .modal-content {
            background: var(--warm-white);
            max-width: 700px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 3rem;
            position: relative;
            border-radius: 4px;
        }
        
        .modal-close {
            position: absolute;
            top: 1rem;
            right: 1rem;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: transparent;
            border: 1px solid var(--accent);
            cursor: pointer;
            font-size: 1.2rem;
            color: var(--accent);
        }
        
        .modal-date {
            font-size: 0.8rem;
            color: var(--light-accent);
            letter-spacing: 0.2em;
            margin-bottom: 1rem;
        }
        
        .modal-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2rem;
            margin-bottom: 2rem;
        }
        
        .modal-body {
            font-size: 1.1rem;
            line-height: 2;
            margin-bottom: 2rem;
            white-space: pre-line;
        }
        
        .modal-actions {
            display: flex;
            gap: 1rem;
            justify-content: center;
            padding-top: 2rem;
            border-top: 1px solid rgba(92, 64, 51, 0.1);
        }
        
        /* Footer */
        footer {
            background: var(--text-dark);
            color: var(--cream);
            text-align: center;
            padding: 3rem 2rem;
        }
        
        /* Scroll to Top */
        .scroll-top {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--accent);
            color: white;
            border: none;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.3s;
        }
        
        .scroll-top.visible {
            display: flex;
        }
        
        /* Mobile */
        @media (max-width: 768px) {
            .nav-links {
                display: none;
            }
            
            .carousel-container {
                padding: 0 40px;
            }
            
            .carousel-title {
                font-size: 1.8rem;
            }
            
            .carousel-content {
                font-size: 1rem;
            }
            
            .poems-grid {
                grid-template-columns: 1fr;
            }
            
            .modal-content {
                padding: 2rem 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="texture-overlay"></div>
    
    <nav>
        <div class="nav-container">
            <a href="#" class="logo">勿繁</a>
            <ul class="nav-links">
                <li><a href="#featured">精选</a></li>
                <li><a href="#all-poems">全部诗作</a></li>
                <li><a href="#about">关于</a></li>
            </ul>
        </div>
    </nav>
    
    <section class="hero" id="featured">
        <div class="carousel-container">
            <button class="carousel-arrow prev" onclick="moveCarousel(-1)">←</button>
            <div class="carousel-wrapper">
                <div class="carousel-track" id="carouselTrack">
                    <!-- Slides will be inserted by JS -->
                </div>
            </div>
            <button class="carousel-arrow next" onclick="moveCarousel(1)">→</button>
        </div>
    </section>
    
    <section class="intro-section">
        <div class="divider"></div>
        <h2>勿繁 · 短诗集</h2>
        <p>写字的人，留下一些短记</p>
        <p>不归类、不解释、不追认</p>
        <div class="divider"></div>
    </section>
    
    <section class="all-poems" id="all-poems">
        <h2 class="section-title">全部诗作</h2>
        <div class="poems-grid" id="poemsGrid"></div>
    </section>
    
    <footer id="about">
        <p>勿繁 · 短诗集 · 2015-2019</p>
    </footer>
    
    <button class="scroll-top" id="scrollTop" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">↑</button>
    
    <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button class="modal-close" onclick="closeModal()">×</button>
            <div class="modal-date" id="modalDate"></div>
            <h2 class="modal-title" id="modalTitle"></h2>
            <div class="modal-body" id="modalBody"></div>
            <div class="modal-actions">
                <button class="action-btn" onclick="sharePoem()">分享</button>
                <button class="action-btn" onclick="copyLink()">复制链接</button>
                <button class="action-btn rattle-btn" onclick="rattlePoem(this)">
                    <span class="rattle-count">0</span> 棒棒糖
                </button>
            </div>
        </div>
    </div>
    
    <script>
        // All poems data
        const poems = [
            {
                title: '我想',
                date: '2015.5.30',
                content: `将悲哀写进命里，用血去颂扬。\n用绳索搭起桥梁，喉颈是通关的符杖。\n黑夜。愿您慈祥，闭上眼就是天堂。\n愿一盏暗淡的灯，终于燃尽了糟破的灯心。\n从暗了开始，就是光亮。\n我讨厌阳光，讨厌它总标注着希望。\n昨天一样，今天还是一样！\n它不是我的光。\n。\n如果生活已经没有了所谓的乐趣，\n然而它也未曾告诉你可以离去。\n那，就去挥霍，就去放荡。\n你的生命就是你的了，\n自由便可以不计代价的崇尚。\n然而，\n你却说了已经没有。\n那有什么必要去拥有生命。\n在如此无聊的日子里，\n只需要尽了气力就好。\n就像下雨，\n总有一个完，\n下得大一点，\n就结束得快一点。。。。。`,
                image: 'images/poem_001.jpg'
            },
            {
                title: '带着阳光上路',
                date: '2015.12.18',
                content: `如果没有，\n那便要寻其替代，与占据。\n因为完整，当可以继续下去，\n是自己还可以看着太阳，\n想起任意一丝温暖的味。\n当已不会，\n于夏天观雪，于是漫漫在绿叶纷零。\n合定入了一段省略号，\n同样的点，无限的个数。\n然而，\n话以思维为半径，\n转了一圈，\n回到的，便还是简单的最简单：\n路还在前方，\n所以不停滞，\n而且带着阳光。`,
                image: 'images/poem_002.jpg'
            },
            {
                title: '何必相扰',
                date: '2016.5.11',
                content: `你与我，默然于世之苍茫，\n无念你，无求你，\n不同行与你。\n尔命，吾途。\n相望而笑，\n无欲，何必相扰。`,
                image: 'images/poem_003.jpg'
            },
            {
                title: '生命',
                date: '2016.10.7',
                content: `有的东西，\n可以看到，摸到，感受到，\n不过却永远得不到。\n我也曾去感受，\n去尝试，\n不过，注定的，就是注定的。\n比如说，\n杯子用来喝水，\n碗用来吃饭，\n我，\n用来感受世上所有的苍凉。\n然后，默然。\n若无其事地好好生活，\n学习，以后，工作。\n然后等着，\n太阳升起来，\n光照在身上，开了花，\n忘了\n那些现在\n或者已经叫做过去了的\n所谓的\n生命。\n或许每个人都一样，\n又或许，\n每个人都不一样。。`,
                image: 'images/poem_004.jpg'
            },
            {
                title: '游者之命',
                date: '2016.10.8',
                content: `所谓游者:\n一个人\n从孤独而来;\n再，\n孤独地走向死亡。\n生活的游者，\n生来就背负债孽，\n命运，\n用一生的孤独\n偿还前世的债，\n不可避免，无法逃脱。\n便为，\n游者之命。\n附述:\n斯为游者，与彼协行。\n彼之缥缈，不可追寻。`,
                image: 'images/poem_005.jpg'
            },
            {
                title: '没办法',
                date: '2016.10.15',
                content: `没办法，\n那是我写过最长的一首诗，\n本来以为它的题目，\n会像天上的月亮一样，\n不过，\n事实是，\n题目会丢，\n就像没有缘分的人一样。\n之后，\n只记得尘土堆叠在了时间上\n别的，\n都忘了。。。\n成了某人的历史，\n都会被尘土卷去，\n那间房子里，\n只会留下\n能陪某人的人。`,
                image: 'images/poem_006.jpg'
            },
            {
                title: '它，从来就没有过',
                date: '2016.10.17',
                content: `如果我说了，\n附和了，\n同意了，\n然后忘了，\n就没人想起了，\n那就是说， 它，\n本来就没有过，\n无论是提议，决定，承诺……\n存在过？\n只是出现过而已。`,
                image: 'images/poem_007.jpg'
            },
            {
                title: '做算术',
                date: '2016.12.27',
                content: `旅途错了，心情也错了\n还是牵绊多了，\n忘得剩自己就好了。\n那样该在的，\n就都会不用挂念的在了。\n关键是，不累，\n更适合我，\n所以，经历才是演算式，\n走一步下一步，\n错了就划掉，但不会重来。\n这样到最后，\n就肯定是结果了`,
                image: 'images/poem_008.jpg'
            },
            {
                title: '自然的样子',
                date: '2016.12.28',
                content: `展现阳光是一种作态\n拥抱孤独是一种信仰\n当脸上刷上了世态的油漆，\n双手被锁在内心的石柱上，\n那就叫做了自然，\n自然地笑，自然地伤，\n自然地说着某些话，\n心里又自然的鄙弃着\n外面这个陌生的东西，\n自然的知道怎么用\n这个“自己”把自己全身都铺盖\n把那个自己藏好，\n然后越来越老道，\n让自己更自然的从心底认为\n那个我就是我了，\n这个我也毫无疑问的是我了。\n也毫无疑问地承认\n我在坚持，而我在抵制，\n我在发扬，而我在禁止，\n我在争抢，而我在丢弃，\n我在拥有，而我在遗失，\n也毫无疑问地承认了\n我一直不需要，而我一直在需要，\n我很强，而我很弱。\n我强到有风的地方就敢去飞，\n也弱到自己不知道什么时候\n或许就在接下来的某一个瞬间\n选择消失。\n就像一条河，\n我在这边注视着，\n同样注视着我的，\n在河的对岸的我。\n还好，河上有一座桥，\n我的桥，\n它是一幅画:\n画在夜里，\n天上没有月亮，星星，\n画在路上，\n我蒙上了眼睛，\n一手拿着坚强，\n一手拿着玻璃。`,
                image: 'images/poem_009.jpg'
            },
            {
                title: '习惯和命',
                date: '2017.1.6',
                content: `有人选择用生命去吟唱歌曲，\n有人选择用终身来摆脱孤独。\n所以歌曲就成了习惯，\n而孤独就成了命~`,
                image: 'images/poem_010.jpg'
            },
            {
                title: '转角无阳光',
                date: '2017.1.7',
                content: `既然选择了孤独，\n就要经得住凄凉。\n放不下也是悲伤，\n毕竟你不在他的心上。\n给自己留下一片苍茫，\n记得没有人来寻找，\n也没有人来告诉你:\n诶，小伙~\n前面那个转角有阳光。`,
                image: 'images/poem_011.jpg'
            },
            {
                title: '知道',
                date: '2017.1.7',
                content: `耳听美好心领寂寥，\n听着听着就笑了，\n笑着笑着就哭了，\n知道，天永远在头上，\n也知道，地也永远在脚下。`,
                image: 'images/poem_012.jpg'
            },
            {
                title: '亡',
                date: '2017.1.9',
                content: `给自己找个理由，\n让阳光，\n能照在身上，\n让黑暗，\n不那么早来。\n我也曾想，\n我的夜空，\n总会有那么几点星，\n然而，\n却是夜色深重，\n慢慢地浸染了目光，\n快要吞噬了心灵。\n天地不仁，\n不曾许下一点恩佑，\n我为刍狗，\n溅落的一点烟星\n都是一个活的理由。`,
                image: 'images/poem_013.jpg'
            },
            {
                title: '诶，兄弟，你右脚鞋带开了',
                date: '2017.1.10',

                image: 'images/poem_089.jpg'
            },
            {
                title: '山竹（台风）',
                date: '2018.9.16',
                content: `风刮跑了思念\n我想去找\n却也错过了明天\n如果心能飞山竹一般远\n或许就能抓到\n一点没有吹残的想念\n怎耐浮世三千\n却不敌才疏学浅`,
                image: 'images/poem_090.jpg'
            },
            {
                title: '骆驼与沙漠',
                date: '2018.9.17',
                content: `磕破，放过\n风餐露宿\n见过枯海和蛇\n生性浪迹\n远不能到渺茫的城郭\n头顶汇了光芒\n成了圈索\n套了心里的骆驼\n驼铃叮当\n转不出方圆的沙漠`,
                image: 'images/poem_091.jpg'
            },
            {
                title: '命',
                date: '2018.9.19',
                content: `未来化成了一把钥匙\n握在手里\n看得出奇\n你可以选择不再开门\n却要记得面带笑意\n无法反抗命根本上的东西\n或许成为庸者\n或许成为俗人`,
                image: 'images/poem_092.jpg'
            },
            {
                title: '完成',
                date: '2018.11.1',
                content: `不曾想，不要想；\n不可想，不必想。\n都是两脚踏上一路，\n要么走到天黑，\n要么就走到尽头。`,
                image: 'images/poem_093.jpg'
            },
            {
                title: '木池',
                date: '2019.1.8',
                content: `一木临于一池，池有鱼，木有鸟。却春风秋夜，时如沙之飞舞，叶随光落，水随辰蒸。有鱼或无鱼，有羽或无羽。千百年，唯不变木与池矣。何？岁月如长，韶光相望。心念：愿伴子之侧，与子偕老，诺以春秋，同存浩渺。\n此木，曰之为椿，池，湫也。`,
                image: 'images/poem_094.jpg'
            }
        ];
        
        // Featured poems = first 4 from poems array
        const featuredPoems = poems.slice(0, 4);
        
        let currentSlide = 0;
        
        function initCarousel() {
            const track = document.getElementById('carouselTrack');
            featuredPoems.forEach((poem, index) => {
                const slide = document.createElement('div');
                slide.className = 'carousel-slide';
                slide.innerHTML = `
                    <div class="carousel-date">${poem.date}</div>
                    <h2 class="carousel-title">${poem.title}</h2>
                    <div class="carousel-content">${poem.content}</div>
                    <div class="audio-player">
                        <button class="play-btn">▶</button>
                        <div class="progress-bar"><div class="progress-fill"></div></div>
                        <span class="time">0:00 / 2:17</span>
                    </div>
                    <div class="action-buttons">
                        <button class="action-btn" onclick="sharePoem(${index})">分享</button>
                        <button class="action-btn" onclick="copyLink(${index})">复制链接</button>
                        <button class="action-btn rattle-btn" onclick="rattlePoem(this)">
                            <span class="rattle-count">${Math.floor(Math.random() * 50) + 10}</span> 棒棒糖
                        </button>
                    </div>
                `;
                track.appendChild(slide);
            });
        }
        
        function moveCarousel(direction) {
            const track = document.getElementById('carouselTrack');
            currentSlide = (currentSlide + direction + featuredPoems.length) % featuredPoems.length;
            track.style.transform = `translateX(-${currentSlide * 100}%)`;
        }
        
        function renderPoems() {
            const grid = document.getElementById('poemsGrid');
            poems.forEach((poem, index) => {
                const card = document.createElement('div');
                card.className = 'poem-card';
                card.onclick = () => openModal(index);
                card.innerHTML = `
                    <img data-src="images/poem_${String(index + 1).padStart(3, '0')}.jpg" alt="${poem.title}" class="lazy-image">
                    <div class="poem-card-content">
                        <h3>${poem.title}</h3>
                        <div class="date">${poem.date}</div>
                        <div class="preview">${poem.content.substring(0, 100)}...</div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }
        
        function openModal(index) {
            const poem = poems[index];
            document.getElementById('modalDate').textContent = poem.date;
            document.getElementById('modalTitle').textContent = poem.title;
            document.getElementById('modalBody').textContent = poem.content;
            document.getElementById('modalOverlay').classList.add('active');
            document.body.style.overflow = 'hidden';
        }
        
        function closeModal(event) {
            if (!event || event.target === document.getElementById('modalOverlay')) {
                document.getElementById('modalOverlay').classList.remove('active');
                document.body.style.overflow = '';
            }
        }
        
        function sharePoem(index) {
            if (navigator.share) {
                navigator.share({
                    title: poems[index]?.title || '勿繁 · 短诗集',
                    text: poems[index]?.content?.substring(0, 100) || '',
                    url: window.location.href
                });
            } else {
                alert('分享功能需要HTTPS环境');
            }
        }
        
        function copyLink(index) {
            const url = window.location.href;
            navigator.clipboard.writeText(url).then(() => {
                alert('链接已复制');
            });
        }
        
        function rattlePoem(btn) {
            const count = btn.querySelector('.rattle-count');
            count.textContent = parseInt(count.textContent) + 1;
            btn.style.background = 'var(--accent)';
            btn.style.color = 'white';
        }
        
        // Lazy loading
        const imageObserver = new IntersectionObserver((entries, observer) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const img = entry.target;
                    img.src = img.dataset.src;
                    img.classList.remove('lazy-image');
                    observer.unobserve(img);
                }
            });
        });
        
        // Scroll to top
        window.addEventListener('scroll', () => {
            const btn = document.getElementById('scrollTop');
            if (window.scrollY > window.innerHeight / 2) {
                btn.classList.add('visible');
            } else {
                btn.classList.remove('visible');
            }
        });
        
        // Initialize
        initCarousel();
        renderPoems();
        
        document.querySelectorAll('.lazy-image').forEach(img => {
            imageObserver.observe(img);
        });
    </script>
</body>
</html>
